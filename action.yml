name: "Review Insights"
description: "Analyze PR review statistics per user with matrices, heatmaps, and time-series visualizations"
author: "review-insights"

branding:
  icon: "bar-chart-2"
  color: "blue"

inputs:
  github-token:
    description: >
      GitHub token with repo read access. Defaults to the workflow token.
      Required permissions: contents:read and pull-requests:read.
      For output-mode "comment", also pull-requests:write.
    required: false
    default: ${{ github.token }}

  repository:
    description: "Repository to analyze (owner/repo). Defaults to current repository."
    required: false
    default: ${{ github.repository }}

  since:
    description: >
      Start date for the PR creation window (ISO 8601, e.g. 2025-01-01).
      Defaults to 90 days ago.
      NOTE: For large repositories with high PR volume, use a shorter range (e.g., 30 days)
      to avoid hitting GitHub API rate limits.
    required: false

  until:
    description: >
      End date for the historical snapshot (ISO 8601). Defaults to now.
      Reviews and merge/close state after this timestamp are ignored.
    required: false

  output-mode:
    description: 'Where to publish results: "summary", "comment", "artifact", or comma-separated combination.'
    required: false
    default: "summary,artifact"

  bias-threshold:
    description: "Finite Pearson residual threshold for activity-adjusted reviewer-author imbalance, clamped to 0.5-10.0 (default: 2.0)."
    required: false
    default: "2.0"

  include-bots:
    description: >
      Whether to include bot accounts in statistics.
      When false, bot-authored PRs (and all reviews on them) and bot reviews are excluded.
      See docs/filtering.md (default: false).
    required: false
    default: "false"

  max-prs:
    description: >
      Maximum number of PRs to analyze (default: 500).
      If additional PRs remain within the requested date range after this cap
      is reached, outputs are marked as capped rather than complete.
      IMPORTANT: Values above 1000 on very active repositories may consume significant
      API quota and increase execution time.
    required: false
    default: "500"

outputs:
  report-path:
    description: "Path to the generated HTML report file"

  total-prs-analyzed:
    description: "Number of PRs analyzed"

  top-reviewers:
    description: "JSON array of logins tied for the maximum reviewsGiven among users with reviewsGiven > 0, or [] if no active reviewers exist"

  max-reviews-given:
    description: "JSON number for the maximum reviewsGiven among users with reviewsGiven > 0, or null if no active reviewers exist"

  bias-detected:
    description: "Whether at least one reviewer-author pair was flagged by bias detection (true/false). If the bias model is unavailable, that warning is surfaced in the reports and logs."

  partial-data:
    description: "Whether analysis used a capped or partial PR dataset because pagination hit max-prs or the fixed 10-minute collection budget (true/false)"

runs:
  using: "node24"
  main: "dist/index.mjs"
